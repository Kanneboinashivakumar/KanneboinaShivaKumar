<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 145" width="400" height="145">
  <rect width="400" height="145" rx="8" fill="#1a1b26"/>
  <rect x="1" y="8" width="4" height="129" rx="2" fill="#70a5fd"/>
  <text x="310" y="115" font-size="70" fill="#a9b1d6" fill-opacity="0.04" font-family="system-ui, -apple-system, sans-serif">💼</text>
  <style>
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 15px; 
      font-weight: bold; 
      fill: #70a5fd; 
    }
    .desc { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 12px; 
      fill: #a9b1d6; 
    }
    .tech { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      font-weight: bold; 
      fill: #73daca; 
    }
    .feature {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      fill: #a9b1d6;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    .stagger-0 { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .stagger-1 { animation: fadeIn 0.6s ease 0.1s forwards; opacity: 0; }
    .stagger-2 { animation: fadeIn 0.6s ease 0.2s forwards; opacity: 0; }
    .stagger-3 { animation: fadeIn 0.6s ease 0.3s forwards; opacity: 0; }
  </style>
  
  <!-- Header -->
  <g class="stagger-0" transform="translate(20, 32)">
    <text x="0" y="0" class="title">💼 Personal Portfolio</text>
  </g>
  
  <!-- Description -->
  <g class="stagger-1" transform="translate(20, 56)">
    <text x="0" y="0" class="desc">Modern portfolio with rich interactive layout elements.</text>
  </g>
  
  <!-- Features -->
  <g class="stagger-2" transform="translate(20, 82)">
    <text x="0" y="0" class="feature">• Ultra smooth scrolling animations and transitions</text>
    <text x="0" y="18" class="feature">• Highly responsive grid mechanics for multi-display</text>
    <text x="0" y="36" class="feature">• Contact forms integration &amp; dynamic projects filters</text>
  </g>
  
  <!-- Tech Stack -->
  <g class="stagger-3" transform="translate(20, 131)">
    <circle cx="4" cy="-3" r="4" fill="#73daca"/>
    <text x="14" y="1" class="tech">HTML5 • CSS3 • JavaScript • GSAP</text>
  </g>
</svg>
