<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f2335">
        <animate attributeName="stop-color" values="#1f2335;#292e42;#1f2335" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1a1b26" />
    </radialGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #70a5fd; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #a9b1d6; }
    .value { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #73daca; }
  </style>

  <rect width="800" height="160" rx="8" fill="url(#bgGlow)"/>
  <rect x="1" y="8" width="4" height="144" rx="2" fill="#70a5fd"/>

  <!-- Title -->
  <g transform="translate(25, 30)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0s" fill="freeze" />
    <text x="0" y="0" class="title">Coding Activity (Active Hours)</text>
  </g>

  <!-- === LEFT COLUMN === -->
  <g transform="translate(25, 45)">

    <!-- Morning (40%) -->
    <g transform="translate(0, 15)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze" />
      <text x="0" y="0" class="label">🌅 Morning (6:00 AM - 12:00 PM)</text>
      <text x="350" y="0" class="value" text-anchor="end">40%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#fbbf24">
        <animate attributeName="width" values="0;140" dur="1.5s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Daytime (65%) -->
    <g transform="translate(0, 55)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" />
      <text x="0" y="0" class="label">🌆 Daytime (12:00 PM - 6:00 PM)</text>
      <text x="350" y="0" class="value" text-anchor="end">65%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#3b82f6">
        <animate attributeName="width" values="0;227.5" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

  </g>

  <!-- === RIGHT COLUMN === -->
  <g transform="translate(425, 45)">

    <!-- Evening (35%) -->
    <g transform="translate(0, 15)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze" />
      <text x="0" y="0" class="label">🌃 Evening (6:00 PM - 12:00 AM)</text>
      <text x="350" y="0" class="value" text-anchor="end">35%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#8b5cf6">
        <animate attributeName="width" values="0;122.5" dur="1.5s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Night (70%) -->
    <g transform="translate(0, 55)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" />
      <text x="0" y="0" class="label">🌙 Night (12:00 AM - 6:00 AM)</text>
      <text x="350" y="0" class="value" text-anchor="end">70%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#6366f1">
        <animate attributeName="width" values="0;245" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

  </g>
</svg>
