<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <rect width="448" height="198" x="1" y="1" rx="8" fill="#1a1b26" stroke="#2e3047" stroke-width="1.5"/>
  <style>
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 16px; 
      font-weight: bold; 
      fill: #70a5fd; 
    }
    .label { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 13px; 
      fill: #a9b1d6; 
    }
    .value { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 13px; 
      font-weight: bold; 
      fill: #73daca; 
    }
    
    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .stagger-0 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .stagger-1 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; }
    .stagger-2 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
    .stagger-3 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; opacity: 0; }
    .stagger-4 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
    .stagger-5 { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; opacity: 0; }
  </style>
  
  <g class="stagger-0">
    <text x="25" y="35" class="title">GitHub Stats</text>
  </g>
  
  <g transform="translate(25, 65)">
    <!-- Commits -->
    <g class="stagger-1">
      <text x="0" y="5" class="label">Total Commits:</text>
      <text x="400" y="5" class="value" text-anchor="end">350+</text>
    </g>
    
    <!-- PRs -->
    <g class="stagger-2">
      <text x="0" y="30" class="label">Pull Requests:</text>
      <text x="400" y="30" class="value" text-anchor="end">25+</text>
    </g>
    
    <!-- Issues -->
    <g class="stagger-3">
      <text x="0" y="55" class="label">Total Issues Resolved:</text>
      <text x="400" y="55" class="value" text-anchor="end">15+</text>
    </g>
    
    <!-- Repos -->
    <g class="stagger-4">
      <text x="0" y="80" class="label">Public Repositories:</text>
      <text x="400" y="80" class="value" text-anchor="end">12</text>
    </g>

    <!-- Contribs -->
    <g class="stagger-5">
      <text x="0" y="105" class="label">Contributed Repositories:</text>
      <text x="400" y="105" class="value" text-anchor="end">8+</text>
    </g>
  </g>
</svg>
