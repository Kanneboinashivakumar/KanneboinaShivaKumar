<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 155" width="400" height="155">
  <rect width="400" height="155" rx="8" fill="#1a1b26"/>
  <rect x="1" y="8" width="4" height="139" rx="2" fill="#70a5fd"/>
  <style>
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 15px; 
      font-weight: bold; 
      fill: #70a5fd; 
    }
    .desc { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 12px; 
      fill: #a9b1d6; 
    }
    .tech { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      font-weight: bold; 
      fill: #73daca; 
    }
    .feature {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      fill: #a9b1d6;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes floatWatermark {
      0% { opacity: 0.03; transform: translateY(0px) scale(1); }
      50% { opacity: 0.07; transform: translateY(-4px) scale(1.05); }
      100% { opacity: 0.03; transform: translateY(0px) scale(1); }
    }
    
    .stagger-0 { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .stagger-1 { animation: fadeIn 0.6s ease 0.1s forwards; opacity: 0; }
    .stagger-2 { animation: fadeIn 0.6s ease 0.2s forwards; opacity: 0; }
    .stagger-3 { animation: fadeIn 0.6s ease 0.3s forwards; opacity: 0; }
    
    .watermark {
      animation: floatWatermark 8s ease-in-out infinite;
      transform-origin: 345px 95px;
      font-size: 70px;
      fill: #a9b1d6;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
  
  <!-- Watermark -->
  <text x="310" y="115" class="watermark">🤖</text>
  
  <!-- Header -->
  <g class="stagger-0" transform="translate(20, 32)">
    <text x="0" y="0" class="title">🤖 ML Projects Collection</text>
  </g>
  
  <!-- Description -->
  <g class="stagger-1" transform="translate(20, 56)">
    <text x="0" y="0" class="desc">Various Machine Learning model implementations.</text>
  </g>
  
  <!-- Features -->
  <g class="stagger-2" transform="translate(20, 82)">
    <text x="0" y="0" class="feature">• Advanced data preprocessing &amp; cleaning pipelines</text>
    <text x="0" y="20" class="feature">• Predictive modeling, model training and metrics logs</text>
    <text x="0" y="40" class="feature">• Real-time performance telemetry &amp; parameter tuning</text>
  </g>
  
  <!-- Tech Stack -->
  <g class="stagger-3" transform="translate(20, 140)">
    <circle cx="4" cy="-3" r="4" fill="#73daca"/>
    <text x="14" y="1" class="tech">Python • Scikit-learn • TensorFlow • NumPy</text>
  </g>
</svg>
