<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f2335">
        <animate attributeName="stop-color" values="#1f2335;#292e42;#1f2335" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1a1b26" />
    </radialGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #70a5fd; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #a9b1d6; }
    .value { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #73daca; }
  </style>

  <rect width="800" height="200" rx="8" fill="url(#bgGlow)"/>
  <rect x="1" y="8" width="4" height="184" rx="2" fill="#70a5fd"/>

  <!-- Title -->
  <g transform="translate(25, 30)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0s" fill="freeze" />
    <text x="0" y="0" class="title">Skills Matrix &amp; Proficiency</text>
  </g>

  <!-- === LEFT COLUMN === -->
  <g transform="translate(25, 45)">

    <!-- Item 1: Full Stack Dev (90%) -->
    <g transform="translate(0, 15)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze" />
      <text x="0" y="0" class="label">Full Stack Development</text>
      <text x="350" y="0" class="value" text-anchor="end">90%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <!-- bar animates from width 0 to 315 (90% of 350) -->
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#60a5fa">
        <animate attributeName="width" values="0;315" dur="1.5s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 2: Machine Learning (75%) -->
    <g transform="translate(0, 50)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" />
      <text x="0" y="0" class="label">Machine Learning</text>
      <text x="350" y="0" class="value" text-anchor="end">75%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#818cf8">
        <animate attributeName="width" values="0;262.5" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 3: Data Structures (85%) -->
    <g transform="translate(0, 85)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze" />
      <text x="0" y="0" class="label">Data Structures (DSA)</text>
      <text x="350" y="0" class="value" text-anchor="end">85%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#34d399">
        <animate attributeName="width" values="0;297.5" dur="1.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 4: Python (90%) -->
    <g transform="translate(0, 120)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.4s" fill="freeze" />
      <text x="0" y="0" class="label">Python Programming</text>
      <text x="350" y="0" class="value" text-anchor="end">90%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#60a5fa">
        <animate attributeName="width" values="0;315" dur="1.5s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

  </g>

  <!-- === RIGHT COLUMN === -->
  <g transform="translate(425, 45)">

    <!-- Item 5: JS/React (80%) -->
    <g transform="translate(0, 15)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze" />
      <text x="0" y="0" class="label">JavaScript / React</text>
      <text x="350" y="0" class="value" text-anchor="end">80%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#818cf8">
        <animate attributeName="width" values="0;280" dur="1.5s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 6: Database (85%) -->
    <g transform="translate(0, 50)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" />
      <text x="0" y="0" class="label">Database Design (SQL/NoSQL)</text>
      <text x="350" y="0" class="value" text-anchor="end">85%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#34d399">
        <animate attributeName="width" values="0;297.5" dur="1.5s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 7: Problem Solving (95%) -->
    <g transform="translate(0, 85)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze" />
      <text x="0" y="0" class="label">Problem Solving (Algorithms)</text>
      <text x="350" y="0" class="value" text-anchor="end">95%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#ec4899">
        <animate attributeName="width" values="0;332.5" dur="1.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

    <!-- Item 8: Team Collaboration (85%) -->
    <g transform="translate(0, 120)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.4s" fill="freeze" />
      <text x="0" y="0" class="label">Team Collaboration / Git</text>
      <text x="350" y="0" class="value" text-anchor="end">85%</text>
      <rect x="0" y="6" width="350" height="6" rx="3" fill="#16161e"/>
      <rect x="0" y="6" width="0" height="6" rx="3" fill="#60a5fa">
        <animate attributeName="width" values="0;297.5" dur="1.5s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
      </rect>
    </g>

  </g>
</svg>
