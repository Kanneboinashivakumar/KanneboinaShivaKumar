<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 145" width="400" height="145">
  <path d="M 1,144 L 1,9 Q 1,1 9,1 L 391,1 Q 399,1 399,9 L 399,144 Z" fill="#1a1b26" stroke="#2e3047" stroke-width="1.5"/>
  <style>
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 15px; 
      font-weight: bold; 
      fill: #70a5fd; 
    }
    .desc { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 12px; 
      fill: #a9b1d6; 
    }
    .tech { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      font-weight: bold; 
      fill: #73daca; 
    }
    .feature {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      fill: #a9b1d6;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    .stagger-0 { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .stagger-1 { animation: fadeIn 0.6s ease 0.1s forwards; opacity: 0; }
    .stagger-2 { animation: fadeIn 0.6s ease 0.2s forwards; opacity: 0; }
    .stagger-3 { animation: fadeIn 0.6s ease 0.3s forwards; opacity: 0; }
  </style>
  
  <!-- Header -->
  <g class="stagger-0" transform="translate(20, 32)">
    <text x="0" y="0" class="title">🌌 LIFEOS - Gamified RPG Productivity</text>
  </g>
  
  <!-- Description -->
  <g class="stagger-1" transform="translate(20, 56)">
    <text x="0" y="0" class="desc">Gamified Personal Growth RPG &amp; Deep Work Hub.</text>
  </g>
  
  <!-- Features -->
  <g class="stagger-2" transform="translate(20, 80)">
    <text x="0" y="0" class="feature">• Interactive mouse-following 3D robot interface</text>
    <text x="0" y="18" class="feature">• Pomodoro focus protocols with active XP gains</text>
    <text x="0" y="36" class="feature">• Production containerized Cloud Run orchestration</text>
  </g>
  
  <!-- Tech Stack -->
  <g class="stagger-3" transform="translate(20, 131)">
    <circle cx="4" cy="-3" r="4" fill="#73daca"/>
    <text x="14" y="1" class="tech">Next.js 16 • React 19 • Tailwind CSS • Docker</text>
  </g>
</svg>
