<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 155" width="400" height="155">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f2335">
        <animate attributeName="stop-color" values="#1f2335;#292e42;#1f2335" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1a1b26" />
    </radialGradient>
    <filter id="blurGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  
  <rect width="400" height="155" rx="8" fill="url(#bgGlow)"/>
  
  <!-- Floating Glowing Bokeh Orbs -->
  <g filter="url(#blurGlow)">
    <!-- Orb 1: Blue -->
    <circle cx="0" cy="0" r="18" fill="#70a5fd" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="320,40; 340,60; 300,50; 320,40" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.22;0.08" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Orb 2: Green -->
    <circle cx="0" cy="0" r="15" fill="#73daca" opacity="0.12">
      <animateTransform attributeName="transform" type="translate" values="80,110; 100,90; 60,100; 80,110" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Orb 3: Purple -->
    <circle cx="0" cy="0" r="12" fill="#bb9af7" opacity="0.15">
      <animateTransform attributeName="transform" type="translate" values="260,80; 240,60; 280,90; 260,80" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.25;0.08" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="1" y="8" width="4" height="139" rx="2" fill="#70a5fd"/>

  <style>
    .title { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 15px; 
      font-weight: bold; 
      fill: #70a5fd; 
    }
    .desc { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 12px; 
      fill: #a9b1d6; 
    }
    .tech { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      font-weight: bold; 
      fill: #73daca; 
    }
    .feature {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
      font-size: 11px; 
      fill: #a9b1d6;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .stagger-0 { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .stagger-1 { animation: fadeIn 0.6s ease 0.1s forwards; opacity: 0; }
    .stagger-2 { animation: fadeIn 0.6s ease 0.2s forwards; opacity: 0; }
    .stagger-3 { animation: fadeIn 0.6s ease 0.3s forwards; opacity: 0; }
    
    .watermark {
      font-size: 70px;
      fill: #a9b1d6;
      fill-opacity: 0.04;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
  
  <!-- Watermark -->
  <text x="310" y="115" class="watermark">🌌</text>
  
  <!-- Header -->
  <g class="stagger-0" transform="translate(20, 32)">
    <text x="0" y="0" class="title">🌌 LIFEOS - Gamified RPG Productivity</text>
  </g>
  
  <!-- Description -->
  <g class="stagger-1" transform="translate(20, 56)">
    <text x="0" y="0" class="desc">Gamified Personal Growth RPG &amp; Deep Work Hub.</text>
  </g>
  
  <!-- Features -->
  <g class="stagger-2" transform="translate(20, 80)">
    <text x="0" y="0" class="feature">• Interactive mouse-following 3D robot interface</text>
    <text x="0" y="18" class="feature">• Pomodoro focus protocols with active XP gains</text>
    <text x="0" y="36" class="feature">• Production containerized Cloud Run orchestration</text>
  </g>
  
  <!-- Tech Stack -->
  <g class="stagger-3" transform="translate(20, 131)">
    <circle cx="4" cy="-3" r="4" fill="#73daca"/>
    <text x="14" y="1" class="tech">Next.js 16 • React 19 • Tailwind CSS • Docker</text>
  </g>
</svg>
