<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 155" width="400" height="155">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f2335">
        <animate attributeName="stop-color" values="#1f2335;#292e42;#1f2335" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#1a1b26" />
    </radialGradient>
    <linearGradient id="iconShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2f4a" />
      <stop offset="35%" stop-color="#2a2f4a" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#2a2f4a" />
      <stop offset="100%" stop-color="#2a2f4a" />
      <animate attributeName="x1" values="-100%; 100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%; 200%" dur="3s" repeatCount="indefinite" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="155" rx="8" fill="url(#bgGlow)"/>
  
  <rect width="400" height="155" rx="8" fill="none" stroke="#73daca" stroke-width="2" stroke-dasharray="100 1010" stroke-dashoffset="0" filter="url(#neonGlow)">
    <animate attributeName="stroke-dashoffset" values="0; -1110" dur="5s" repeatCount="indefinite" />
  </rect>
  
  <rect x="1" y="8" width="4" height="139" rx="2" fill="#70a5fd"/>
  
  <!-- Falling Sparkles -->
  <g>
    <path d="M 0,-5 L 1.5,-1.5 L 5,0 L 1.5,1.5 L 0,5 L -1.5,1.5 L -5,0 L -1.5,-1.5 Z" fill="#e0af68">
      <animateTransform attributeName="transform" type="translate" values="320,-10; 290,165" dur="8s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="8s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0;0.9;0" dur="8s" repeatCount="indefinite" />
    </path>
    <path d="M 0,-4 L 1,-1 L 4,0 L 1,1 L 0,4 L -1,1 L -4,0 L -1,-1 Z" fill="#70a5fd">
      <animateTransform attributeName="transform" type="translate" values="100,-10; 130,165" dur="11s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; -360" dur="11s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0;0.8;0" dur="11s" repeatCount="indefinite" />
    </path>
    <path d="M 0,-4 L 1,-1 L 4,0 L 1,1 L 0,4 L -1,1 L -4,0 L -1,-1 Z" fill="#73daca">
      <animateTransform attributeName="transform" type="translate" values="240,-10; 210,165" dur="9s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="9s" repeatCount="indefinite" additive="sum" />
      <animate attributeName="opacity" values="0;0.8;0" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #70a5fd; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #a9b1d6; }
    .tech { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #73daca; }
    .feature { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #a9b1d6; }
  </style>
  
  <!-- Shimmering Globe Icon -->
  <g opacity="0.25" transform="translate(345, 70)" fill="none" stroke="url(#iconShimmer)" stroke-width="3">
    <circle cx="0" cy="0" r="25" stroke-width="4" />
    <ellipse cx="0" cy="0" rx="25" ry="10" />
    <ellipse cx="0" cy="0" rx="10" ry="25" />
    <line x1="-25" y1="0" x2="25" y2="0" />
    <line x1="0" y1="-25" x2="0" y2="25" />
  </g>
  
  <!-- Header -->
  <g transform="translate(20, 32)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0s" fill="freeze" />
    <text x="0" y="0" class="title">🌐 BharatAkshar - Language Platform</text>
  </g>
  
  <!-- Description -->
  <g transform="translate(20, 56)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.1s" fill="freeze" />
    <text x="0" y="0" class="desc">Multi-language Indian learning &amp; transliteration platform.</text>
  </g>
  
  <!-- Features -->
  <g transform="translate(20, 82)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" />
    <text x="0" y="0" class="feature">• Multiple regional Indian languages support</text>
    <text x="0" y="18" class="feature">• Transliteration models using OCR and Text-to-Speech</text>
    <text x="0" y="36" class="feature">• Interactive learning modules, games &amp; progress trackers</text>
  </g>
  
  <!-- Tech Stack -->
  <g transform="translate(20, 131)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze" />
    <circle cx="4" cy="-3" r="4" fill="#73daca"/>
    <text x="14" y="1" class="tech">HTML5 • CSS3 • JavaScript • Python</text>
  </g>
</svg>
